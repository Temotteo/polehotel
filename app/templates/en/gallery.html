{% extends 'base.html' %}
{% block title %} — Gallery{% endblock %}
{% block content %}
<div class="container py-5">
  <h2 class="mb-4">Photo Gallery</h2>
  <div class="row g-3">
    {% for i in range(1,9) %}
    <div class="col-6 col-md-3">
      <img src="{{ url_for('static', filename='img/gallery/pic'+i|string+'.jpg') }}" class="img-fluid rounded-4" alt="Photo {{ i }}">
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
